<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>稀土价格行情日周月排行</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif;}
        body{background:#f5f5f5;padding:10px;}
        .title{font-size:18px;color:#333;margin:10px 0;padding-left:10px;font-weight:bold;}
        .tab{display:flex;background:#fff;border-radius:4px;margin-bottom:10px;overflow:hidden;}
        .tab-item{flex:1;text-align:center;padding:12px 0;cursor:pointer;font-size:16px;color:#333;}
        .tab-item.active{background:#2E7D32;color:#fff;}
        .time{font-size:12px;color:#666;margin:5px 0 10px 10px;}
        table{width:100%;border-collapse:collapse;background:#fff;border-radius:4px;overflow:hidden;}
        th{background:#2E7D32;color:#fff;padding:10px 5px;font-size:14px;text-align:center;}
        td{padding:10px 5px;font-size:14px;text-align:center;border-bottom:1px solid #eee;}
        tr:nth-child(even){background:#f9f9f9;}
        .up{color:#388E3C;font-weight:bold;}
        .down{color:#D32F2F;font-weight:bold;}
        .flat{color:#666;}
        .content{display:none;}
        .content.active{display:block;}
    </style>
</head>
<body>
    <div class="title">稀土价格行情排行</div>
    <div class="tab">
        <div class="tab-item active" onclick="switchTab('day')">日排行</div>
        <div class="tab-item" onclick="switchTab('week')">周排行</div>
        <div class="tab-item" onclick="switchTab('month')">月排行</div>
    </div>
    <div class="time">更新时间：<span id="updateTime">加载中...</span></div>

    <div id="day" class="content active">
        <table>
            <thead>
                <tr><th>排名</th><th>料品名称</th><th>均价(万/吨)</th><th>日涨跌</th></tr>
            </thead>
            <tbody id="dayBody"></tbody>
        </table>
    </div>

    <div id="week" class="content">
        <table>
            <thead>
                <tr><th>排名</th><th>料品名称</th><th>周涨跌</th></tr>
            </thead>
            <tbody id="weekBody"></tbody>
        </table>
    </div>

    <div id="month" class="content">
        <table>
            <thead>
                <tr><th>排名</th><th>料品名称</th><th>月涨跌</th></tr>
            </thead>
            <tbody id="monthBody"></tbody>
        </table>
    </div>

    <script>
        function switchTab(id){
            document.querySelectorAll('.content').forEach(c=>c.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
        }

        // 自动读取爬虫数据
        window.onload = async function(){
            let res = await fetch("data.json");
            let data = await res.json();
            document.getElementById("updateTime").innerText = data.update_time;

            // 渲染日榜
            let dayHtml = "";
            data.day.forEach((item,idx)=>{
                dayHtml += `<tr>
                    <td>${idx+1}</td>
                    <td>${item.name}</td>
                    <td>${item.price}</td>
                    <td class="${item.class}">${item.change}</td>
                </tr>`;
            });
            document.getElementById("dayBody").innerHTML = dayHtml;

            // 渲染周榜
            let weekHtml = "";
            data.week.forEach((item,idx)=>{
                weekHtml += `<tr>
                    <td>${idx+1}</td>
                    <td>${item.name}</td>
                    <td class="${item.class}">${item.change}</td>
                </tr>`;
            });
            document.getElementById("weekBody").innerHTML = weekHtml;

            // 渲染月榜
            let monthHtml = "";
            data.month.forEach((item,idx)=>{
                monthHtml += `<tr>
                    <td>${idx+1}</td>
                    <td>${item.name}</td>
                    <td class="${item.class}">${item.change}</td>
                </tr>`;
            });
            document.getElementById("monthBody").innerHTML = monthHtml;
        }
    </script>
</body>
</html>
